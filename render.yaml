services:
  - type: web
    name: autoclient-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 5000
      - key: WHATSAPP_AUTO_REPLY_ENABLED
        value: true
